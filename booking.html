<!DOCTYPE html>

<style>
  /* Set page-wide styles */
  body {
    height: 100%;
    margin: 0;
    padding: 0;
    font-family: 'Helvetica', sans-serif;
    background: linear-gradient(to bottom, #000716, #000000);
    background-attachment: fixed;
    background-repeat: no-repeat;
    color: white;
  }

  html {
    background: linear-gradient(to bottom, #000716, #000000);
    background-attachment: fixed;
    background-repeat: no-repeat;
  }

  html,
  body {
    background-color: black;
  }

  a {
    color: white;
    text-decoration: none;
  }

  h1,
  h2 {
    font-weight: 500;
    letter-spacing: 2px;
    margin: 0.5rem 0;
  }

  h3 {
    font-weight: 200;
    letter-spacing: 1.5px;
  }

  p {
    margin: 0.5rem 0;
  }

  .nav-link {
    font: 'Helvetica', sans-serif;
    font-weight: 200;
    color: #CACACA;
    text-decoration: none;
    display: inline-block;
    transition: transform 0.2s ease;
    letter-spacing: 1.5px;
  }

  .nav-link:hover {
    transform: scale(1.15);
    text-decoration: underline;
  }

  .follow-link {
    font: 'Roboto', sans-serif;
    font-weight: 200;
    color: white;
    text-decoration: none;
    display: inline-block;
    transition: transform 0.2s ease;
    letter-spacing: 0.5px;
    align-items: center;
    display: flex;
    gap: 0.5rem;
  }

  .follow-link:hover {
    transform: scale(1.15);
    text-decoration: underline;
  }

  .call-link {
    font: 'Roboto', sans-serif;
    font-weight: 300;
    font-size: 3rem;
    color: white;
    text-decoration: none;
    display: inline-block;
    transition: transform 0.2s ease;
    letter-spacing: 5px;
    align-items: center;
    display: flex;
    gap: 0.5rem;
  }

  .call-link:hover {
    transform: scale(1.05);
  }

  #newsletter-form {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }

  #newsletter-form input[type="email"] {
    padding: 0.75rem 1rem;
    font-size: 1rem;
    border: none;
    border-radius: 6px;
    background-color: #1a1a1a;
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.2);
    width: 300px;
    transition: border 0.3s ease;
  }

  #newsletter-form input[type="email"]:focus {
    outline: none;
    border: 1px solid rgb(127, 177, 249);
  }

  #newsletter-form button {
    padding: 0.75rem 1.5rem;
    font-size: 1rem;
    border: none;
    border-radius: 6px;
    background-color: rgb(127, 177, 249);
    color: black;
    cursor: pointer;
    transition: background-color 0.3s ease, transform 0.2s ease;
  }

  #newsletter-form button:hover {
    background-color: #5ea2ff;
    transform: scale(1.05);
  }

  #form-status {
    text-align: center;
    margin-top: 1rem;
    font-weight: 300;
    font-size: 1rem;
  }

  #hero-bg {
    animation: zoomPan 30s infinite alternate ease-in-out;
  }

  @keyframes zoomPan {
    0% {
      transform: scale(1) translateX(0%);
    }

    100% {
      transform: scale(1.1) translateX(-5%);
    }
  }

  @keyframes bgPanX {
    0% {
      background-position: left center;
    }

    100% {
      background-position: right center;
    }
  }

  .bg-pan-animate {
    background-size: 110%;
    background-repeat: no-repeat;
    animation: bgPanX 30s ease-in-out infinite alternate;
  }
</style>

<head>

</head>
