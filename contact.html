<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact GearUP Automotive | Calgary Mobile Auto Service</title>

    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/icons/favicon-16x16.png">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>
</head>

<body>
    <div id="nav-placeholder"></div>
    <div
        style="display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 50vh 50vh; width: 100vw; height: 100vh;">
        <!-- Top Left: Image with "Contact Us" -->
        <div
            style="background-image: url('assets/images/bg/contact-header.jpg'); filter: brightness(50%);background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; z-index:1;">
        </div>

        <!-- Top Right: Address Info -->
        <div
            style="color: #CACACA; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 2rem;">
            <img src="assets/images/branding/banner.png" alt="GearUP Logo"
                style="max-width: 300px; margin-bottom: 2rem;">
            <p style="color: #70B3FF"> Call or Text: <a href="tel:14036716271">+1 (403) 671 6271</a></p>
            <p>Sunday to Friday<br>10:00am to 6:30pm</p>
            <p><a href="mailto:gearup.dynamics@gmail.com" style="color: #70B3FF;">gearup.dynamics@gmail.com</a></p>
            <p>Mail to:<br>214-1134 Seton Cir SE<br>Calgary, AB T3M 3V4<br>Canada</p>
        </div>

        <!-- Bottom Left: Contact Form -->
        <div
            style=" display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem;">
            <h1 style="
                font-weight: 300;
                letter-spacing: 1.5px;
                margin-bottom: 0.75rem;
                color: white;
                ">
                GET IN TOUCH
            </h1>

            <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field"
                onsubmit="handleSubmit(event)"
                style="width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 1rem;">
                <input type="hidden" name="form-name" value="contact">
                <input type="hidden" name="subject" data-remove-prefix value="New inquiry from GearUP contact form">
                <p style="display: none;">
                    <label>Do not fill this out if you are human: <input name="bot-field"></label>
                </p>
                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <input type="text" name="name" placeholder="Name *" required style="flex: 1 1 0; min-width: 0;">
                    <input type="email" name="email" placeholder="Email *" required style="flex: 1 1 0; min-width: 0;">
                </div>
                <input type="text" name="phone" placeholder="Phone">
                <textarea name="message" placeholder="Message *" rows="4" required></textarea>
                <button type="submit">SEND</button>
            </form>
            <div id="confirmation" style="display: none; margin-top: 1rem; color: #70B3FF; font-weight: 300;">
                Thank you for contacting us! Please expect a response within 1-2 business days.
            </div>
            <div style="margin-top: 0.25rem;">
                <p style="font-size: 0.9rem; color: gray;">* Required fields</p>
            </div>
        </div>

        <!-- Bottom Right: Lab Image -->
        <div
            style="background-image: url('assets/images/bg/contact-footer.jpg'); background-size: cover; background-position: center; filter:brightness(50%)">
        </div>
    </div>

    <div id="footer-placeholder"></div>
    <!-- Navigation Bar Fetch -->
    <script>
        fetch("partials/nav.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("nav-placeholder").innerHTML = data;
            });
    </script>
    <!-- Footer Fetch -->
    <script>
        fetch("partials/footer.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("footer-placeholder").innerHTML = data;
            });
    </script>
    <!-- Contact Form Backend-->
    <script>
        function handleSubmit(event) {
            event.preventDefault();

            const form = event.target;
            const nameField = form.querySelector('[name="name"]');
            const subjectField = form.querySelector('[name="subject"]');

            if (subjectField) {
                const customerName = nameField && nameField.value.trim() ? nameField.value.trim() : "website visitor";
                subjectField.value = `New inquiry from ${customerName}`;
            }

            const data = new FormData(form);

            fetch("/", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams(data).toString()
            })
                .then(() => {
                    form.style.display = "none";
                    document.getElementById("confirmation").style.display = "block";
                })
                .catch(() => {
                    alert("There was a problem submitting the form. Please call or text us instead.");
                });
        }
    </script>
</body>

</html>
