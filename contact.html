<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GearUP Automotive | Contact Us</title>

    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/icons/favicon-16x16.png">
    <link rel="canonical" href="https://gearup-auto.ca/contact">

    <!-- Main CSS-->
    <link rel="stylesheet" href="css/main.css" />
</head>

<body>
    <div id="nav-placeholder"></div>
    <div class="contact-grid">
        <!-- Top Left: Image with "Contact Us" -->
        <div class="contact-grid-image" style="background-image: url('/assets/images/bg/contact-header.jpg');">
        </div>

        <!-- Top Right: Location Info -->
        <div class="contact-grid-info">
            <img class="contact-grid-logo" src="assets/images/branding/banner.png"
                alt="GearUP Automotive Dynamics Contact Us Banner Logo">
            <p class="link" style="transform: scale(1); text-decoration:none"> Call or Text: <a class="link"
                    href="tel:14036716271">+1 (403) 671 6271</a></p>
            <p>Sunday to Friday<br>10:00am to 6:30pm</p>
            <p><a class="link" href="mailto:gearup.dynamics@gmail.com">gearup.dynamics@gmail.com</a></p>
            <p>Mail to:<br>214-1134 Seton Cir SE<br>Calgary, AB T3M 3V4<br>Canada</p>
        </div>

        <!-- Bottom Left: Contact Form -->
        <div class="contact-cta">
            <h1 class="contact-header">Contact Us</h1>
            <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field"
                onsubmit="handleSubmit(event)"
                style="width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 1rem;">
                <input type="hidden" name="form-name" value="contact">
                <input type="hidden" name="subject" data-remove-prefix value="New inquiry from GearUP contact form">
                <p style="display: none;">
                    <label>Do not fill this out if you are human: <input name="bot-field"></label>
                </p>
                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <input type="text" name="name" placeholder="Name *" required style="flex: 1 1 0; min-width: 0;">
                    <input type="email" name="email" placeholder="Email *" required style="flex: 1 1 0; min-width: 0;">
                </div>
                <input type="text" name="phone" placeholder="Phone">
                <textarea name="message" placeholder="Message *" rows="4" required></textarea>
                <button type="submit">SEND</button>
            </form>
            <div id="confirmation" style="display: none; margin-top: 1rem; color: var(--link-light); font-weight: 300;">
                Thank you for contacting us! Please expect a response within 1-2 business days.
            </div>
            <div style="margin-top: 0.25rem;">
                <p style="font-size: 0.9rem; color: gray;">* Required fields</p>
            </div>
        </div>

        <!-- Bottom Right: Lab Image -->
        <div class="contact-grid-image" style="background-image: url('assets/images/bg/contact-footer.jpg')">
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
